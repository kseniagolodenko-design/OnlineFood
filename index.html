<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Food</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<header>
<div class="logo">
    <img src="logo.svg" alt="Logo">
    <h2>OnlineFood</h2>
</div>



    <nav>
    <a href="#" class="active" data-search="бургер">Бургери</a>
    <a href="#" data-search="🍕 ">Піца</a>
    <a href="#" data-search="шаурма">Шаурма</a>
    <a href="#" data-search="картопля">Картопля</a>
    <a href="#" data-search="хот">Хот-доги</a>
</nav>
    

    <div class="header-actions">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Пошук...">
            <img src="search.svg" alt="Search" id="searchIcon">
        </div>

        <div class="cart-nav" id="cartIcon">
    🛒 <span id="cartCount">0</span>
</div>

<div class="cart-dropdown" id="cartDropdown">
    <h3>Кошик</h3>

    <div id="cartItems"></div>

    <div id="cartTotal">Разом: 0 грн</div>

    <button class="onclick" onclick="clearCart()">Очистити</button>
</div>
        <img src="user.svg" alt="User">

        <button id="orderButton">Замовити</button>
        
 </div>


</header>
<main>
    <section class="home"></section>
</main>

<footer class="main-footer">
    <div class="footer-container"
       <div class="footer-block">
        <h2>Online Food</h2>
        <p>Доставка за 30-45 хвилин або бургер безкоштовно</p>
    </div>
       
    <div class="footer-block">
        <h4>Горяча лінія</h4>
        <p>0-800-FAST-FOOD</P>
        <P>Працюємо 24/7<p>
    </div>
        
    </div class="footer-block">
        <h4>Слідкуй за нами</h4>
    </div>
    
    <div class="sosial-icons">
        <a href="#">TikTok</a>
        <a> href="#">Instagram</a>
    </div>

    <div class="footer-bottom">
       <p>&copy; 2026 Team OnlineFood. Всі права захищені.</p>
    </div>
</footer>

<div id="recipeModal" class="modal">
    <div class="modal-content">
        <span id="closeModalBtn">&times;</span>

        <img id="modalImage" src="" alt="">
        <h2 id="modalTitle"></h2>
        <h3 id="modalPrice"></h3>

        <p><strong>Склад:</strong></p>
        <p id="modalIngredients"></p>

        <p><strong>Як готувати:</strong></p>
        <p id="modalInstructions"></p>
    </div>
</div>

<script src="main.js"></script>


    <script src="main.js"></script>
</body>
</html>
